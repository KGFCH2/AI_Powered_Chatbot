{% extends "base.html" %}

{% block title %}Login - AI Chatbot{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card glass-card">
        <div class="auth-header">
            <h2 class="auth-title gradient-text">Welcome Back</h2>
            <p class="auth-subtitle">Sign in to continue your AI conversations</p>
        </div>
        
        <form class="auth-form" id="loginForm">
            <div class="form-group">
                <label for="username" class="form-label">
                    <i class="fas fa-user"></i>
                    Username
                </label>
                <input type="text" id="username" name="username" class="form-input" required>
                <div class="input-focus-line"></div>
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">
                    <i class="fas fa-lock"></i>
                    Password
                </label>
                <input type="password" id="password" name="password" class="form-input" required>
                <div class="input-focus-line"></div>
                <button type="button" class="password-toggle" id="passwordToggle">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
            
            <button type="submit" class="btn btn-primary btn-full">
                <span class="btn-text">Sign In</span>
                <div class="btn-loader">
                    <div class="spinner"></div>
                </div>
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Don't have an account? 
                <a href="{{ url_for('register') }}" class="auth-link">Sign up here</a>
            </p>
        </div>
        
        <div class="alert alert-error" id="errorAlert" style="display: none;">
            <i class="fas fa-exclamation-triangle"></i>
            <span id="errorMessage"></span>
        </div>
    </div>
    
    <!-- Decorative elements -->
    <div class="auth-decoration">
        <div class="floating-icon icon-1">
            <i class="fas fa-robot"></i>
        </div>
        <div class="floating-icon icon-2">
            <i class="fas fa-brain"></i>
        </div>
        <div class="floating-icon icon-3">
            <i class="fas fa-comments"></i>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
