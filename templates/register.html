{% extends "base.html" %}

{% block title %}Register - AI Chatbot{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card glass-card">
        <div class="auth-header">
            <h2 class="auth-title gradient-text">Join Us</h2>
            <p class="auth-subtitle">Create your account to start chatting with AI</p>
        </div>
        
        <form class="auth-form" id="registerForm">
            <div class="form-group">
                <label for="username" class="form-label">
                    <i class="fas fa-user"></i>
                    Username
                </label>
                <input type="text" id="username" name="username" class="form-input" required>
                <div class="input-focus-line"></div>
            </div>
            
            <div class="form-group">
                <label for="email" class="form-label">
                    <i class="fas fa-envelope"></i>
                    Email
                </label>
                <input type="email" id="email" name="email" class="form-input" required>
                <div class="input-focus-line"></div>
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">
                    <i class="fas fa-lock"></i>
                    Password
                </label>
                <input type="password" id="password" name="password" class="form-input" required>
                <div class="input-focus-line"></div>
                <button type="button" class="password-toggle" id="passwordToggle">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
            
            <div class="form-group">
                <label for="confirmPassword" class="form-label">
                    <i class="fas fa-lock"></i>
                    Confirm Password
                </label>
                <input type="password" id="confirmPassword" name="confirmPassword" class="form-input" required>
                <div class="input-focus-line"></div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-full">
                <span class="btn-text">Create Account</span>
                <div class="btn-loader">
                    <div class="spinner"></div>
                </div>
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Already have an account? 
                <a href="{{ url_for('login') }}" class="auth-link">Sign in here</a>
            </p>
        </div>
        
        <div class="alert alert-error" id="errorAlert" style="display: none;">
            <i class="fas fa-exclamation-triangle"></i>
            <span id="errorMessage"></span>
        </div>
    </div>
    
    <!-- Decorative elements -->
    <div class="auth-decoration">
        <div class="floating-icon icon-1">
            <i class="fas fa-robot"></i>
        </div>
        <div class="floating-icon icon-2">
            <i class="fas fa-brain"></i>
        </div>
        <div class="floating-icon icon-3">
            <i class="fas fa-comments"></i>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
