<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="bg2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="bg3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <!-- Background shapes -->
  <circle cx="150" cy="100" r="80" fill="url(#bg1)"/>
  <circle cx="650" cy="200" r="120" fill="url(#bg2)"/>
  <circle cx="200" cy="450" r="100" fill="url(#bg3)"/>
  <circle cx="600" cy="500" r="90" fill="url(#bg1)"/>
  
  <!-- Floating geometric shapes -->
  <polygon points="400,50 420,80 380,80" fill="url(#bg2)"/>
  <rect x="100" y="300" width="60" height="60" rx="10" fill="url(#bg3)" transform="rotate(45 130 330)"/>
  <polygon points="700,350 720,380 680,380" fill="url(#bg1)" transform="rotate(180 700 365)"/>
  
  <!-- Abstract neural network pattern -->
  <g opacity="0.3">
    <!-- Nodes -->
    <circle cx="300" cy="150" r="3" fill="#667eea"/>
    <circle cx="350" cy="180" r="3" fill="#764ba2"/>
    <circle cx="400" cy="160" r="3" fill="#f093fb"/>
    <circle cx="450" cy="190" r="3" fill="#4facfe"/>
    <circle cx="500" cy="170" r="3" fill="#43e97b"/>
    
    <!-- Connections -->
    <line x1="300" y1="150" x2="350" y2="180" stroke="#667eea" stroke-width="1"/>
    <line x1="350" y1="180" x2="400" y2="160" stroke="#764ba2" stroke-width="1"/>
    <line x1="400" y1="160" x2="450" y2="190" stroke="#f093fb" stroke-width="1"/>
    <line x1="450" y1="190" x2="500" y2="170" stroke="#4facfe" stroke-width="1"/>
    <line x1="300" y1="150" x2="400" y2="160" stroke="#43e97b" stroke-width="1"/>
    <line x1="350" y1="180" x2="450" y2="190" stroke="#667eea" stroke-width="1"/>
  </g>
  
  <!-- Decorative dots pattern -->
  <g opacity="0.2">
    <circle cx="50" cy="50" r="2" fill="#667eea"/>
    <circle cx="80" cy="70" r="1.5" fill="#764ba2"/>
    <circle cx="110" cy="90" r="1" fill="#f093fb"/>
    <circle cx="750" cy="100" r="2" fill="#4facfe"/>
    <circle cx="720" cy="80" r="1.5" fill="#43e97b"/>
    <circle cx="690" cy="60" r="1" fill="#667eea"/>
    <circle cx="100" cy="550" r="2" fill="#764ba2"/>
    <circle cx="700" cy="550" r="1.5" fill="#f093fb"/>
  </g>
</svg>