<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="url(#faviconGradient)"/>
  
  <!-- Robot head -->
  <rect x="8" y="8" width="16" height="12" rx="3" fill="white"/>
  
  <!-- Eyes -->
  <circle cx="12" cy="14" r="2" fill="#667eea"/>
  <circle cx="20" cy="14" r="2" fill="#667eea"/>
  
  <!-- Antenna -->
  <line x1="13" y1="8" x2="13" y2="5" stroke="white" stroke-width="1"/>
  <line x1="19" y1="8" x2="19" y2="5" stroke="white" stroke-width="1"/>
  <circle cx="13" cy="5" r="1" fill="#f093fb"/>
  <circle cx="19" cy="5" r="1" fill="#f093fb"/>
  
  <!-- Body -->
  <rect x="10" y="20" width="12" height="8" rx="2" fill="white"/>
  
  <!-- Chest detail -->
  <rect x="14" y="22" width="4" height="4" rx="1" fill="#667eea" opacity="0.3"/>
</svg>