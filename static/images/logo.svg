<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- AI Robot Icon -->
  <rect x="5" y="15" width="30" height="30" rx="5" fill="url(#logoGradient)"/>
  
  <!-- Robot Eyes -->
  <circle cx="15" cy="25" r="3" fill="white"/>
  <circle cx="25" cy="25" r="3" fill="white"/>
  <circle cx="15" cy="25" r="1" fill="#333"/>
  <circle cx="25" cy="25" r="1" fill="#333"/>
  
  <!-- Robot Antenna -->
  <line x1="17" y1="15" x2="17" y2="10" stroke="white" stroke-width="1"/>
  <line x1="23" y1="15" x2="23" y2="10" stroke="white" stroke-width="1"/>
  <circle cx="17" cy="10" r="1.5" fill="#f093fb"/>
  <circle cx="23" cy="10" r="1.5" fill="#f093fb"/>
  
  <!-- Robot Mouth -->
  <rect x="17" y="35" width="6" height="2" rx="1" fill="white"/>
  
  <!-- Text -->
  <text x="45" y="25" font-family="Poppins, sans-serif" font-size="16" font-weight="700" fill="url(#logoGradient)">AI</text>
  <text x="65" y="25" font-family="Poppins, sans-serif" font-size="14" font-weight="500" fill="#718096">Chatbot</text>
  
  <!-- Decorative elements -->
  <circle cx="140" cy="15" r="2" fill="#667eea" opacity="0.6"/>
  <circle cx="150" cy="25" r="1.5" fill="#764ba2" opacity="0.6"/>
  <circle cx="160" cy="20" r="1" fill="#f093fb" opacity="0.6"/>
  
  <!-- Chat bubble -->
  <path d="M 170 35 Q 170 30 175 30 L 190 30 Q 195 30 195 35 L 195 40 Q 195 45 190 45 L 180 45 L 175 50 L 175 45 Q 170 45 170 40 Z" fill="url(#logoGradient)" opacity="0.3"/>
  <text x="175" y="40" font-family="Poppins, sans-serif" font-size="6" fill="white">Hi!</text>
</svg>