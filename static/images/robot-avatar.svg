<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="robotGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Robot Head -->
  <rect x="25" y="15" width="50" height="40" rx="8" fill="url(#robotGradient)"/>
  
  <!-- Eyes -->
  <circle cx="35" cy="30" r="5" fill="white"/>
  <circle cx="65" cy="30" r="5" fill="white"/>
  <circle cx="35" cy="30" r="2" fill="#333"/>
  <circle cx="65" cy="30" r="2" fill="#333"/>
  
  <!-- Antenna -->
  <line x1="40" y1="15" x2="40" y2="8" stroke="url(#robotGradient)" stroke-width="2"/>
  <line x1="60" y1="15" x2="60" y2="8" stroke="url(#robotGradient)" stroke-width="2"/>
  <circle cx="40" cy="8" r="3" fill="#f093fb"/>
  <circle cx="60" cy="8" r="3" fill="#f093fb"/>
  
  <!-- Mouth -->
  <rect x="40" y="40" width="20" height="3" rx="1" fill="white"/>
  
  <!-- Body -->
  <rect x="30" y="55" width="40" height="35" rx="5" fill="url(#robotGradient)"/>
  
  <!-- Arms -->
  <rect x="15" y="60" width="15" height="8" rx="4" fill="url(#robotGradient)"/>
  <rect x="70" y="60" width="15" height="8" rx="4" fill="url(#robotGradient)"/>
  
  <!-- Chest Panel -->
  <rect x="40" y="65" width="20" height="15" rx="3" fill="rgba(255,255,255,0.2)"/>
  
  <!-- Buttons -->
  <circle cx="45" cy="72" r="1.5" fill="#4facfe"/>
  <circle cx="55" cy="72" r="1.5" fill="#43e97b"/>
  
  <!-- Legs -->
  <rect x="35" y="90" width="8" height="15" rx="4" fill="url(#robotGradient)"/>
  <rect x="57" y="90" width="8" height="15" rx="4" fill="url(#robotGradient)"/>
</svg>